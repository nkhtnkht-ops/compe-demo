<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>予約チェック管理 — 体験デモ</title>
<style>
  :root{--blue:#1f6fc4;--ink:#1f2937;--line:#e5e7eb;--muted:#6b7280;}
  *{box-sizing:border-box;font-family:"Noto Sans JP","Hiragino Sans","Yu Gothic",sans-serif;-webkit-tap-highlight-color:transparent;}
  body{margin:0;background:#dfe3e8;color:var(--ink);}
  .demo-note{background:#fff7e6;border-bottom:1px solid #f0d28a;color:#6b5400;font-size:12px;padding:6px 12px;text-align:center;}
  .app{max-width:1180px;margin:0 auto;background:#fff;min-height:100vh;display:flex;flex-direction:column;}
  .appbar{background:var(--blue);color:#fff;display:flex;align-items:center;gap:8px;padding:8px 14px;flex-wrap:wrap;}
  .appbar .ttl{font-weight:700;font-size:16px;}
  .appbar .sp{flex:1;}
  .nav{background:rgba(255,255,255,.18);color:#fff;border:0;border-radius:6px;font-size:13px;padding:7px 11px;cursor:pointer;}
  .nav:disabled{opacity:.4;cursor:default;}
  .toggle{background:#fff;color:var(--blue);border:0;border-radius:20px;font-weight:700;font-size:13px;padding:7px 14px;cursor:pointer;}
  .refresh{background:#ffd54a;color:#5b4500;border:0;border-radius:20px;font-weight:700;font-size:13px;padding:7px 14px;cursor:pointer;}
  .body{display:flex;flex:1;min-height:0;}
  .side{flex:1;border-right:1px solid var(--line);display:flex;flex-direction:column;min-width:0;}
  .sbar{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;border-bottom:1px solid var(--line);font-size:12px;color:var(--muted);gap:6px;flex-wrap:wrap;}
  .sortgrp{display:flex;align-items:center;gap:4px;}
  .sortb{border:1px solid var(--line);background:#fff;color:#374151;border-radius:14px;font-size:11px;font-weight:700;padding:4px 9px;cursor:pointer;}
  .sortb.on{background:var(--blue);color:#fff;border-color:var(--blue);}
  .list{overflow:auto;}
  .gi{padding:10px 12px;border-bottom:1px solid var(--line);display:flex;gap:10px;align-items:center;cursor:pointer;}
  .gi:hover{background:#f9fbfd;} .gi.sel{background:#eef4fb;}
  .gi .main{flex:1;min-width:0;}
  .gi .nm{font-weight:600;} .gi .sub{font-size:12px;color:var(--muted);margin-top:2px;}
  .gi .due{font-size:11px;margin-top:3px;}
  .gi .memo-prev{font-size:11px;color:#6b7280;margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%;background:#f7f8fa;border-radius:4px;padding:2px 6px;}
  .due.act{color:#b35900;font-weight:700;} .due.carry{color:#b91c1c;font-weight:700;} .due.done{color:#1a7f37;font-weight:700;}
  .sel-wrap{display:flex;gap:4px;align-items:center;flex-shrink:0;flex-wrap:wrap;}
  .sb{border:1px solid var(--line);background:#fff;border-radius:6px;font-size:12px;font-weight:700;padding:5px 7px;cursor:pointer;color:#374151;}
  .sb.done{border-color:#1a7f37;color:#1a7f37;} .sb.zai{border-color:#b35900;color:#b35900;} .sb.fuyo{border-color:#6b7280;color:#6b7280;}
  .sb.on-done{background:#1a7f37;color:#fff;} .sb.on-zai{background:#b35900;color:#fff;} .sb.on-fuyo{background:#6b7280;color:#fff;}
  .sb.undo{border-color:#9ca3af;color:#9ca3af;font-weight:400;}
  .pill{font-size:12px;font-weight:700;padding:4px 8px;border-radius:6px;}
  .pill.green{background:#eafaf0;color:#1a7f37;} .pill.red{background:#fdecea;color:#b91c1c;}
  .empty{padding:30px;text-align:center;color:#9aa1aa;}
  .detail{flex:1.9;padding:14px 20px;overflow:auto;min-width:0;}
  .dh{display:flex;justify-content:space-between;border-bottom:1px solid var(--line);padding-bottom:8px;margin-bottom:12px;}
  .dh .name{font-size:18px;font-weight:700;}
  .delbtn{border:1px solid #d1453b;background:#fff;color:#c0392b;border-radius:6px;font-size:12px;font-weight:700;padding:5px 7px;cursor:pointer;}
  .delbtn:hover{background:#fdecea;}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:10px 22px;}
  .fld .k{font-size:12px;color:#374151;font-weight:600;margin-bottom:3px;}
  .fld .v{background:#f3f4f6;border-radius:4px;padding:7px 10px;font-size:14px;min-height:32px;}
  .v.green{color:#1a7f37;font-weight:700;background:#eafaf0;} .v.gray{color:#6b7280;} .v.red{color:#b91c1c;font-weight:700;background:#fdecea;}
  .editcell{display:flex;justify-content:space-between;align-items:center;gap:6px;background:#f3f4f6;border-radius:4px;padding:6px 8px;flex-wrap:wrap;}
  .onecard{background:#f3f4f6;border-radius:6px;padding:4px 12px;}
  .orow{display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;padding:10px 0;}
  .orow+.orow{border-top:1px solid #e5e7eb;}
  .orow .ok{font-size:13px;color:#374151;font-weight:600;}
  .orow .note{color:#9ca3af;font-weight:400;font-size:11px;}
  .hint{color:#9aa1aa;text-align:center;margin-top:60px;}
  #toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%);background:#111827;color:#fff;padding:10px 18px;border-radius:8px;font-size:13px;opacity:0;transition:.25s;pointer-events:none;z-index:9;}
  #toast.show{opacity:.95;}
  .imp{padding:16px 20px;} .imp .ta{width:100%;height:190px;border:1px solid var(--line);border-radius:6px;padding:12px;font-size:13px;font-family:monospace;}
  .imp .row{margin-top:12px;display:flex;gap:10px;flex-wrap:wrap;} .imp .msg{margin-top:14px;font-size:14px;min-height:22px;}
  .btn{border:0;border-radius:6px;color:#fff;font-weight:700;font-size:13px;padding:8px 12px;cursor:pointer;} .b-gray{background:#6b7280;}.b-blue{background:var(--blue);}.b-green{background:#1a7f37;} .btn:disabled{opacity:.4;}
  .hidden{display:none!important;}
  @media(max-width:820px){.body{flex-direction:column}.side{max-height:50vh}.grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="demo-note">体験デモ｜ダミーデータ｜基準日2026/06/03｜状態は選択式・即消えない・元に戻せます</div>
<div class="app">
  <div class="appbar">
    <span class="ttl">予約チェック管理</span>
    <button class="toggle" id="modeBtn" onclick="toggleMode()"></button>
    <button class="refresh" id="refBtn" onclick="refreshList()">🔄 更新（整理）</button>
    <button class="nav" id="undoBtn" onclick="undoLast()" disabled>↩ 元に戻す</button>
    <button class="nav" id="toImport" onclick="flip(true)">＋ CSV取込</button>
    <button class="nav hidden" id="toMain" onclick="flip(false)">← 一覧へ戻る</button>
    <span class="sp"></span>
  </div>

  <div class="body" id="screenMain">
    <div class="side">
      <div class="sbar"><span id="countLbl"></span>
        <span class="sortgrp">並び：
          <button class="sortb on" id="sortPlay" onclick="setSort('play')">プレー日順</button>
          <button class="sortb" id="sortRecv" onclick="setSort('recv')">受付日順</button>
        </span>
      </div>
      <div class="list" id="list"></div>
    </div>
    <div class="detail" id="detail"></div>
  </div>

  <div class="imp hidden" id="screenImport">
    <textarea class="ta" id="ta" placeholder="予約受付一覧CSVをExcel等で開き、全選択(Ctrl+A)→コピー(Ctrl+C)して、ここに貼り付け(Ctrl+V)してください"></textarea>
    <div class="row">
      <button class="btn b-gray" onclick="pasteSample()">サンプルを貼り付け（デモ）</button>
      <button class="btn b-blue" onclick="extract()">① 抽出して確認</button>
      <button class="btn b-green" id="regBtn" onclick="register()" disabled>② 台帳へ登録</button>
    </div>
    <div class="msg" id="impMsg"></div>
  </div>
</div>
<div id="toast"></div>

<script>
const TODAY=new Date(2026,5,3);
const lbl=["①受付翌日","②60日前","③35日前","④18日前"];
function pd(s){const m=s&&s.match(/(\d{4})\/(\d{1,2})\/(\d{1,2})/);return m?new Date(+m[1],+m[2]-1,+m[3]):null;}
let rows=[
 {n:"山田 太郎",play:"2026/07/20",wd:"月",course:"稲倉",time:"07:37",g:3,p:12,route:"GORA",recv:"2026/06/02",d:["2026/06/03","2026/05/21","2026/06/15","2026/07/02"],s:["","","",""],kk:"",tel:"0724xxxxxx",mob:"09012345678"},
 {n:"佐藤 花子",play:"2026/06/15",wd:"月",course:"犬鳴",time:"08:52",g:3,p:10,route:"AGWeb",recv:"2026/04/16",d:["2026/04/17","2026/04/16","2026/06/03","2026/05/28"],s:["〇","不要","",""],kk:"",tel:"06xxxxxxxx",mob:"08012345678"},
 {n:"鈴木 一郎",play:"2026/08/01",wd:"土",course:"大阪湾",time:"09:07",g:4,p:16,route:"AGWeb",recv:"2026/05/30",d:["2026/05/31","2026/06/02","2026/06/27","2026/07/14"],s:["不在","","",""],kk:"",tel:"0724xxxxxx",mob:"09012345678"},
 {n:"田中 美咲",play:"2026/06/21",wd:"日",course:"犬鳴",time:"10:07",g:5,p:20,route:"電話",recv:"2026/03/05",d:["2026/03/06","2026/04/22","2026/05/17","2026/06/03"],s:["〇","不要","〇",""],kk:"",tel:"0724xxxxxx",mob:"09012345678"},
 {n:"高橋 健",play:"2026/06/25",wd:"木",course:"稲倉",time:"12:37",g:6,p:24,route:"GORA",recv:"2026/04/10",d:["2026/04/11","2026/04/26","2026/05/21","2026/06/07"],s:["〇","〇","〇","〇"],kk:"〇",kumi:"済",tel:"0724xxxxxx",mob:"09012345678"},
 {n:"伊藤 直美",play:"2026/07/03",wd:"金",course:"稲倉",time:"08:22",g:3,p:12,route:"RECRUIT",recv:"2026/05/13",d:["2026/05/14","2026/05/04","2026/05/29","2026/06/15"],s:["〇","不要","〇","〇"],kk:"",tel:"0724xxxxxx",mob:"09012345678"}
];
let showAll=false, selIdx=0, undoStack=[], sortKey='play';
function actRound(r){ if((r.kumi||"")==="済"||r.kk==="キャンセル")return -1; for(const i of [0,2,3]){const dt=pd(r.d[i]); if(dt&&dt<=TODAY&&(r.s[i]===""||r.s[i]==="不在"))return i;} return -1; }
function isToday(r){return actRound(r)>=0;}
function inTodayView(r){return isToday(r)||r._touch;}
function visibleRows(){return showAll?rows:rows.filter(inTodayView);}

function setS(gi,i,val,quiet){
  const r=rows[gi];
  if(r.s[i]===val)return;
  undoStack.push({gi,t:'s',i,prev:r.s[i]});
  r.s[i]=val; r._touch=true; selIdx=gi;
  document.getElementById('undoBtn').disabled=false;
  if(!quiet){
    if(val==='')toast(lbl[i]+'を空に戻しました');
    else if(val==='不在')toast(lbl[i]+'＝不在（繰越で残ります）');
    else toast(lbl[i]+'＝'+val+'（更新するまで一覧に残ります）');
  }
  render();
}
function setF(gi,key,val,jp){
  const r=rows[gi]; if((r[key]||"")===val)return;
  undoStack.push({gi,t:'f',key,prev:r[key]||""});
  r[key]=val; r._touch=true; selIdx=gi;
  document.getElementById('undoBtn').disabled=false;
  toast(jp+'＝'+(val===''?'未':val)+'（更新するまで一覧に残ります）');
  render();
}
function undoLast(){
  if(undoStack.length===0){toast('戻す操作がありません');return;}
  const u=undoStack.pop();
  if(u.t==='f'){rows[u.gi][u.key]=u.prev;} else {rows[u.gi].s[u.i]=u.prev;}
  rows[u.gi]._touch=true; selIdx=u.gi;
  document.getElementById('undoBtn').disabled=undoStack.length===0;
  toast('元に戻しました：'+rows[u.gi].n);
  render();
}
function refreshList(){ rows.forEach(r=>r._touch=false); undoStack=[]; document.getElementById('undoBtn').disabled=true; toast('一覧を整理しました（解決済みを除外）'); render(); }
function toggleMode(){showAll=!showAll;render();}
function setSort(k){sortKey=k;document.getElementById('sortPlay').classList.toggle('on',k==='play');document.getElementById('sortRecv').classList.toggle('on',k==='recv');render();}
function delRow(gi){const r=rows[gi];if(!r)return;if(confirm(r.n+' を削除しますか？\n（この操作は元に戻せません）')){rows.splice(gi,1);if(selIdx>=rows.length)selIdx=Math.max(0,rows.length-1);toast('削除しました：'+r.n);render();}}

function render(){
  const vis=visibleRows();
  vis.sort((a,b)=>{const ka=pd(sortKey==='recv'?a.recv:a.play),kb=pd(sortKey==='recv'?b.recv:b.play);return (ka?ka.getTime():0)-(kb?kb.getTime():0);});
  document.getElementById('countLbl').textContent=(showAll?"全件":"今日やること")+"："+vis.length+"件";
  document.getElementById('modeBtn').textContent="表示："+(showAll?"全件":"今日やること")+" ▾";
  document.getElementById('refBtn').classList.toggle('hidden',showAll);
  const list=document.getElementById('list'); list.innerHTML='';
  if(vis.length===0){list.innerHTML='<div class="empty">'+(showAll?'データなし':'今日やることはありません 🎉')+'</div>';renderDetail();return;}
  vis.forEach(r=>{
    const gi=rows.indexOf(r), a=actRound(r);
    let due,cls;
    if(a<0){ if(r.kk==="キャンセル"){due="✕ キャンセル";cls="carry";} else if((r.kumi||"")==="済"){due="✓ 完了（組合せ入力済）";cls="done";} else {due="✓ 連絡完了・組合せ入力待ち";cls="done";} }
    else if(r.s[a]==="不在"){due="⟳ 繰越（前回不在）："+lbl[a];cls="carry";}
    else {due="要対応："+lbl[a]+"（"+r.d[a]+"）";cls="act";}
    let ctrl;
    if(a<0){ctrl=`<span class="pill green">完了</span>`;}
    else{const cur=r.s[a];ctrl=`<div class="sel-wrap" onclick="event.stopPropagation()">
      <button class="sb done ${cur==='〇'?'on-done':''}" onclick="setS(${gi},${a},'〇')">〇</button>
      <button class="sb zai ${cur==='不在'?'on-zai':''}" onclick="setS(${gi},${a},'不在')">不在</button>
      <button class="sb fuyo ${cur==='不要'?'on-fuyo':''}" onclick="setS(${gi},${a},'不要')">不要</button>
      ${cur?`<button class="sb undo" onclick="setS(${gi},${a},'')">取消</button>`:``}</div>`;}
    const div=document.createElement('div'); div.className='gi'+(gi===selIdx?' sel':'');
    const memoPrev = r.memo ? `<div class="memo-prev" title="${esc(r.memo)}">📝 ${esc(r.memo)}</div>` : ``;
    div.innerHTML=`<div class="main"><div class="nm">${r.n}</div><div class="sub">${r.play}・${r.wd}・${r.course}・${r.g}組</div><div class="due ${cls}">${due}</div>${memoPrev}</div>${ctrl}`;
    div.onclick=()=>{selIdx=gi;render();};
    list.appendChild(div);
  });
  renderDetail();
}
function editCell(gi,i){
  const r=rows[gi],v=r.s[i];
  const disp = v==='〇'?'<span class="pill green">〇</span>':v==='不在'?'<span class="pill red">不在</span>':v==='不要'?'<span style="color:#6b7280;font-weight:700">不要</span>':'<span style="color:#374151">'+r.d[i]+'（予定）</span>';
  return `<div class="editcell"><span>${disp}</span><span class="sel-wrap">
    <button class="sb done ${v==='〇'?'on-done':''}" onclick="setS(${gi},${i},'〇')">〇</button>
    <button class="sb zai ${v==='不在'?'on-zai':''}" onclick="setS(${gi},${i},'不在')">不在</button>
    <button class="sb fuyo ${v==='不要'?'on-fuyo':''}" onclick="setS(${gi},${i},'不要')">不要</button>
    <button class="sb undo" onclick="setS(${gi},${i},'')">空</button></span></div>`;
}
function renderDetail(){
  const d=document.getElementById('detail');
  if(!rows[selIdx]){d.innerHTML='<div class="hint">左の一覧から予約を選んでください</div>';return;}
  const gi=selIdx,r=rows[gi],a=actRound(r);
  let head; if(a<0)head='<div class="v green">対応完了（要対応なし）</div>'; else if(r.s[a]==="不在")head='<div class="v red">繰越（前回不在）：'+lbl[a]+'</div>'; else head='<div class="v" style="color:#b35900;font-weight:700">要対応：'+lbl[a]+'（'+r.d[a]+'）</div>';
  d.innerHTML=`
   <div class="dh"><span style="display:flex;align-items:center;gap:10px"><span class="name">${r.n}</span><button class="sb" onclick="copyText('${r.n}')">コピー</button></span><button class="delbtn" onclick="delRow(${gi})">削除</button></div>
   <div class="grid">
    <div class="fld"><div class="k">プレー日</div><div class="v">${r.play}（${r.wd}）</div></div>
    <div class="fld"><div class="k">コース名</div><div class="v">${r.course}</div></div>
    <div class="fld"><div class="k">組数 / 人数</div><div class="v">${r.g}組 / ${r.p}人</div></div>
    <div class="fld"><div class="k">経路</div><div class="v">${r.route}</div></div>
    <div class="fld"><div class="k">連絡先電話番号</div><div class="editcell"><span>${r.tel}</span><button class="sb" onclick="copyText('${r.tel}')">コピー</button></div></div>
    <div class="fld"><div class="k">携帯電話番号</div><div class="editcell"><span>${r.mob}</span><button class="sb" onclick="copyText('${r.mob}')">コピー</button></div></div>
    <div class="fld"><div class="k">いまの対応状況</div>${head}</div>
   </div>
   <div style="font-size:12px;font-weight:700;color:#374151;margin:14px 0 6px">確定・キャンセル・組合せ</div>
   <div class="onecard">
    <div class="orow">
     <div class="ok">組数確定／キャンセル <span class="note">（確定〇は情報のみ・追跡継続／キャンセルは終了）</span></div>
     <span class="sel-wrap">
      <button class="sb ${(r.kk||'')===''?'on-fuyo':''}" onclick="setF(${gi},'kk','','組数確定')">未</button>
      <button class="sb done ${r.kk==='〇'?'on-done':''}" onclick="setF(${gi},'kk','〇','組数確定')">確定〇</button>
      <button class="sb zai ${r.kk==='キャンセル'?'on-zai':''}" onclick="setF(${gi},'kk','キャンセル','キャンセル')">キャンセル</button>
     </span>
    </div>
    <div class="orow">
     <div class="ok">組合せ入力 <span class="note">（入力済で追跡終了）</span></div>
     <span class="sel-wrap">
      <button class="sb ${(r.kumi||'')===''?'on-fuyo':''}" onclick="setF(${gi},'kumi','','組合せ入力')">未</button>
      <button class="sb done ${(r.kumi||'')==='済'?'on-done':''}" onclick="setF(${gi},'kumi','済','組合せ入力')">入力済</button>
     </span>
    </div>
   </div>
   <div style="font-size:12px;font-weight:700;color:#374151;margin:14px 0 6px">フォロー状況（ここで直接変更・修正できます）</div>
   <div class="grid">
    <div class="fld"><div class="k">①受付翌日</div>${editCell(gi,0)}</div>
    <div class="fld"><div class="k">②60日前</div>${editCell(gi,1)}</div>
    <div class="fld"><div class="k">③35日前</div>${editCell(gi,2)}</div>
    <div class="fld"><div class="k">④18日前</div>${editCell(gi,3)}</div>
   </div>
   <div style="font-size:12px;font-weight:700;color:#374151;margin:14px 0 6px">メモ（連絡内容・申し送り）</div>
   <textarea onchange="rows[${gi}].memo=this.value" placeholder="例）6/3 田中様へ連絡、組数は3組で確定見込み。次回6/15に再確認。" style="width:100%;height:84px;border:1px solid var(--line);border-radius:6px;padding:10px;font-size:13px;font-family:inherit">${(r.memo||'').replace(/&/g,'&amp;').replace(/</g,'&lt;')}</textarea>
   <p style="color:#9aa1aa;font-size:12px;margin-top:14px">戻し方は2通り：①上部 <b>↩ 元に戻す</b> で直前操作を取消／②この詳細で各接点を選び直し（<b>全件</b>表示にすれば完了済みの予約も探して修正できます）。「不在」は〇/不要にするまで繰越で残ります。</p>`;
}
function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),1900);}
function copyText(t){if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(t).then(()=>toast('コピーしました：'+t),()=>fallbackCopy(t));}else{fallbackCopy(t);}}
function fallbackCopy(t){const ta=document.createElement('textarea');ta.value=t;ta.style.position='fixed';ta.style.opacity='0';document.body.appendChild(ta);ta.focus();ta.select();try{document.execCommand('copy');toast('コピーしました：'+t);}catch(e){toast('コピーできませんでした');}document.body.removeChild(ta);}
function flip(imp){document.getElementById('screenMain').classList.toggle('hidden',imp);document.getElementById('screenImport').classList.toggle('hidden',!imp);document.getElementById('toImport').classList.toggle('hidden',imp);document.getElementById('toMain').classList.toggle('hidden',!imp);document.getElementById('modeBtn').classList.toggle('hidden',imp);document.getElementById('refBtn').classList.toggle('hidden',imp||showAll);document.getElementById('undoBtn').classList.toggle('hidden',imp);}

function pasteSample(){document.getElementById('ta').value=sample;document.getElementById('impMsg').textContent='サンプルを貼り付けました。「① 抽出して確認」を押してください';}
let ecount=0;
function extract(){const t=document.getElementById('ta').value.trim();if(!t){document.getElementById('impMsg').textContent='CSVを貼り付けてください';return;}const lines=t.split(/\n/).filter(l=>l.trim()&&l.indexOf('プレー日')<0);let pick=0;lines.forEach(l=>{const c=l.split(',');const g=parseInt((c[7]||'').replace(/[^0-9]/g,''))||0;const m=(c[2]||'').match(/(\d{4})[-/](\d{1,2})[-/](\d{1,2})/);const dt=m?new Date(+m[1],+m[2]-1,+m[3]):null;if(g>=3&&dt&&dt>=TODAY)pick++;});ecount=pick;document.getElementById('impMsg').innerHTML=`抽出 <b>${pick}</b> 件 ／ 新規 <b>${pick}</b> 件（3組以上・未来日のみ。3組未満や過去日は自動除外）。『② 台帳へ登録』へ`;document.getElementById('regBtn').disabled=pick===0;}
function register(){document.getElementById('impMsg').innerHTML=`<span style="color:#1a7f37;font-weight:700">${ecount} 件を台帳に登録しました。『今日やること』に反映されます</span>`;document.getElementById('ta').value='';document.getElementById('regBtn').disabled=true;toast(ecount+' 件を登録しました');}
